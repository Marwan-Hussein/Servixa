name: Deploy Backend to MonsterASP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_PATH: Servixa.Web/Servixa.Web/Servixa.Web.csproj
      PUBLISH_DIR: ./publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish application
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ${{ env.PUBLISH_DIR }} --no-restore

      - name: Check secrets
        run: |
          echo "Server set: ${{ secrets.MONSTERASP_FTP_SERVER != '' }}"
          echo "Username set: ${{ secrets.MONSTERASP_FTP_USERNAME != '' }}"
          echo "Password set: ${{ secrets.MONSTERASP_FTP_PASSWORD != '' }}"

      - name: Put site offline (Release File Locks)
        run: |
          echo "<html><body><h1>Deploying new version... Please wait.</h1></body></html>" > app_offline.htm
          curl -s -T app_offline.htm ftp://${{ secrets.MONSTERASP_FTP_SERVER }}/wwwroot/app_offline.htm --user "${{ secrets.MONSTERASP_FTP_USERNAME }}:${{ secrets.MONSTERASP_FTP_PASSWORD }}"
          # Copy to publish dir so the FTP action doesn't delete it during sync
          cp app_offline.htm ${{ env.PUBLISH_DIR }}/app_offline.htm

      - name: Deploy to MonsterASP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.MONSTERASP_FTP_SERVER }}
          username: ${{ secrets.MONSTERASP_FTP_USERNAME }}
          password: ${{ secrets.MONSTERASP_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./publish/
          server-dir: /wwwroot/

      - name: Bring site back online
        run: |
          curl -s -Q "DELE /wwwroot/app_offline.htm" ftp://${{ secrets.MONSTERASP_FTP_SERVER }}/ --user "${{ secrets.MONSTERASP_FTP_USERNAME }}:${{ secrets.MONSTERASP_FTP_PASSWORD }}"
